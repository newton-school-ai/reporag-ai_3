repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ["--fix"]

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black

  - repo: local
    hooks:
      - id: ascii-only
        name: ASCII-only check
        entry: bash -c 'if grep -rPn "[^\x00-\x7F]" --include="*.py" --include="*.md" --include="*.sh" "$@" 2>/dev/null; then echo "Non-ASCII characters found"; exit 1; fi'
        language: system
        types: [text]
        pass_filenames: true

      - id: internal-data-guard
        name: Block _internal/ files (except PROJECT_CONTEXT.md)
        entry: "bash -c 'for f in \"$@\"; do case \"$f\" in _internal/PROJECT_CONTEXT.md) ;; _internal/*) echo BLOCKED-$f; exit 1;; esac; done'"
        language: system
        types: [text]
        pass_filenames: true
