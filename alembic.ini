# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default version attrs are used.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path pathlists to be prepended to the sys.path in env.py.
prepend_sys_path = .

# version path separator; as of Alembic 1.11.0, this defaults to os.pathsep.
version_path_separator = os

# database url (we override this dynamically in env.py, but a fallback is configured here)
sqlalchemy.url = sqlite:///./reporag.db

[post_write_hooks]
# post_write_hooks defines scripts or tools that run after a revision is created

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
